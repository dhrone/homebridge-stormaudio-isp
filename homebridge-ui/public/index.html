<div id="zone-control" class="mb-3">
  <div id="zone-dropdown-section"></div>
</div>

<script>
  (async () => {
    homebridge.showSpinner();

    let zones = [];
    try {
      zones = await homebridge.request('/zones');
    } catch (e) {
      zones = [];
    }

    const pluginConfig = (await homebridge.getPluginConfig())[0] ?? {};
    const currentZoneId = pluginConfig.zone2 != null ? pluginConfig.zone2.zoneId : undefined;
    const hasZones = Array.isArray(zones) && zones.length > 0;

    homebridge.hideSpinner();
    homebridge.showSchemaForm();

    const section = document.getElementById('zone-dropdown-section');

    if (!hasZones && currentZoneId === undefined) {
      const msg = document.createElement('p');
      msg.className = 'text-muted small';
      msg.textContent =
        'Zone 2 setup will appear here after the plugin connects to your processor. Set the Processor Host below, save, and reload this page.';
      section.appendChild(msg);
    } else if (hasZones) {
      const label = document.createElement('label');
      label.className = 'form-label fw-bold';
      label.textContent = 'Zone 2 Zone ID';

      const select = document.createElement('select');
      select.className = 'form-select mb-2';

      for (const zone of zones) {
        const option = document.createElement('option');
        option.value = String(zone.id);
        option.textContent = zone.name + ' (ID: ' + zone.id + ')';
        if (currentZoneId !== undefined && zone.id === currentZoneId) {
          option.selected = true;
        }
        select.appendChild(option);
      }

      select.addEventListener('change', async () => {
        const selectedId = parseInt(select.value, 10);
        const currentConfig = (await homebridge.getPluginConfig())[0] ?? {};
        const updatedConfig = Object.assign({}, currentConfig, {
          zone2: Object.assign({}, currentConfig.zone2 || {}, { zoneId: selectedId }),
        });
        await homebridge.updatePluginConfig([updatedConfig]);
      });

      section.appendChild(label);
      section.appendChild(select);
    } else {
      const msg = document.createElement('p');
      msg.className = 'text-muted small';
      msg.textContent =
        'Zone list unavailable \u2014 make sure the plugin has connected to your StormAudio processor at least once, then refresh this page.';
      section.appendChild(msg);

      const label = document.createElement('label');
      label.className = 'form-label fw-bold';
      label.textContent = 'Zone 2 Zone ID';

      const input = document.createElement('input');
      input.type = 'number';
      input.className = 'form-control';
      if (currentZoneId !== undefined) {
        input.value = String(currentZoneId);
      }

      input.addEventListener('change', async () => {
        const zoneId = parseInt(input.value, 10);
        if (!isNaN(zoneId)) {
          const currentConfig = (await homebridge.getPluginConfig())[0] ?? {};
          const updatedConfig = Object.assign({}, currentConfig, {
            zone2: Object.assign({}, currentConfig.zone2 || {}, { zoneId: zoneId }),
          });
          await homebridge.updatePluginConfig([updatedConfig]);
        }
      });

      section.appendChild(label);
      section.appendChild(input);
    }
  })();
</script>
